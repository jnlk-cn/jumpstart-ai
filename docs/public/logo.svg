<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#grad1)" />
  
  <!-- Inner Ring -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="white" stroke-width="3" opacity="0.3" />
  
  <!-- AI Text -->
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">AI</text>
  
  <!-- Arrow indicating jump start -->
  <path d="M120 220 L200 280 L280 220" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="280,210 310,220 280,230" fill="white"/>
  
  <!-- Stars decoration -->
  <circle cx="100" cy="100" r="5" fill="white" opacity="0.8"/>
  <circle cx="300" cy="100" r="4" fill="white" opacity="0.6"/>
  <circle cx="320" cy="180" r="3" fill="white" opacity="0.5"/>
  <circle cx="80" cy="260" r="4" fill="white" opacity="0.6"/>
  <circle cx="320" cy="300" r="5" fill="white" opacity="0.7"/>
</svg>
